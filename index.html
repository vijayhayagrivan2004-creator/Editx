<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.6/bundled/lenis.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  z-index:1000;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:white;
}

/* SECTION */
section{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 10%;
}

/* TITLE */
h1{
  font-size:4rem;
  background:linear-gradient(90deg,#00aaff,#0077ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* PARALLAX IMAGE */
.img{
  width:250px;
  margin-top:30px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,170,255,0.4);
}

/* CIRCLE */
.circle{
  position:fixed;
  right:20px;
  top:50%;
  width:90px;
  height:90px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.circle span{
  font-size:10px;
  position:absolute;
  animation:spin 10s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<nav>
  <div>VJ</div>
  <div>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="circle">
  <span>CRAFT • IMPACT • AUTOMATION •</span>
</div>

<section id="home">
  <h1 class="title">Vijay Hayagrivan</h1>
  <p>Mechatronics Engineering Student</p>
  <img src="profile.jpg" class="img">
</section>

<section id="about">
  <h1>About</h1>
  <p>Focused on automation and embedded systems.</p>
</section>

<section id="projects">
  <h1>Projects</h1>
  <p>Coming Soon</p>
</section>

<section id="skills">
  <h1>Skills</h1>
  <p>Python, Arduino, CAD</p>
</section>

<section id="contact">
  <h1>Contact</h1>
  <p>Email: vijayhagrivan2008@gmail.com</p>
</section>

<script>

// SMOOTH SCROLL
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// GSAP ANIMATIONS
gsap.from(".title", {
  y:100,
  opacity:0,
  duration:1.2
});

// SCROLL ANIMATIONS
gsap.utils.toArray("section").forEach(sec => {
  gsap.from(sec.children, {
    scrollTrigger:{
      trigger:sec,
      start:"top 80%"
    },
    y:50,
    opacity:0,
    stagger:0.2
  });
});

// PARALLAX IMAGE
gsap.to(".img", {
  scrollTrigger:{
    trigger:"#home",
    scrub:true
  },
  y:100
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;
  cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
  width:20px;
  height:20px;
  border:2px solid #00aaff;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:0.1s;
  z-index:999;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10%;
}

/* TEXT */
.hero-text h1{
  font-size:4rem;
  background:linear-gradient(90deg,#00aaff,#0077ff);
  -webkit-background-clip:text;
  color:transparent;
}

.typing{
  margin-top:20px;
  font-size:1.3rem;
  opacity:0.8;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  margin-right:10px;
  padding:12px 25px;
  border:1px solid #00aaff;
  border-radius:30px;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#00aaff;
  box-shadow:0 0 20px #00aaff;
}

/* IMAGE 3D */
.hero-img{
  perspective:1000px;
}

.hero-img img{
  width:280px;
  border-radius:20px;
  transition:0.3s;
  box-shadow:0 0 40px rgba(0,170,255,0.4);
}

/* ROTATING SCROLL INDICATOR */
.scroll-circle{
  position:fixed;
  right:30px;
  top:50%;
  transform:translateY(-50%);
  width:100px;
  height:100px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.scroll-circle span{
  position:absolute;
  animation:rotate 10s linear infinite;
  font-size:10px;
  letter-spacing:2px;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* SECTIONS */
section{
  min-height:100vh;
  padding:100px 10%;
}

/* CARDS */
.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 15px 40px rgba(0,170,255,0.3);
}

/* SKILLS */
.bar{
  height:6px;
  background:#222;
  margin-top:10px;
}

.fill{
  height:100%;
  background:#00aaff;
  animation:load 2s forwards;
}

@keyframes load{
  from{width:0;}
}

/* SCROLL ANIMATION */
.hidden{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="cursor"></div>

<!-- ROTATING CIRCLE -->
<div class="scroll-circle">
  <span>SCROLL • SCROLL • SCROLL •</span>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-text">
    <h1>Vijay Hayagrivan</h1>
    <div class="typing" id="typing"></div>

    <a href="https://www.linkedin.com/in/vijayhayagrivan-r-87839a392" class="btn">LinkedIn</a>
    <a href="https://github.com/vijayhayagrivan2004-creator" class="btn">GitHub</a>
    <a href="mailto:vijayhagrivan2008@gmail.com" class="btn">Email</a>
  </div>

  <div class="hero-img">
    <img src="your-photo.jpg" id="tilt">
  </div>

</section>

<!-- ABOUT -->
<section class="hidden">
  <h2>About</h2>
  <p>Passionate Mechatronics Engineering student interested in automation and embedded systems.</p>
</section>

<!-- PROJECT -->
<section class="hidden">
  <h2>Projects</h2>
  <div class="card">Coming Soon</div>
</section>

<script>
// TYPING
const text = "Mechatronics Engineering Student | Interested in Automation";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,30);
  }
}
typing();

// CURSOR
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.top = e.clientY + 'px';
  cursor.style.left = e.clientX + 'px';
});

// 3D TILT
const img = document.getElementById("tilt");
document.addEventListener("mousemove",(e)=>{
  let x = (window.innerWidth/2 - e.pageX)/25;
  let y = (window.innerHeight/2 - e.pageY)/25;
  img.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// SCROLL REVEAL
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.hidden').forEach(el=>{
  observer.observe(el);
});
</script>

</body>
</html>

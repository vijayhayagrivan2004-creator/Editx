<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TITLE */
.hero h1{
  font-size:4rem;
  background:linear-gradient(90deg,#00aaff,#0077ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* TEXT */
.hero p{
  margin-top:20px;
  opacity:0.7;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:1px solid #00aaff;
  border-radius:30px;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#00aaff;
}

/* IMAGE */
.hero img{
  width:180px;
  margin-top:40px;
  border-radius:50%;
  box-shadow:0 0 40px rgba(0,170,255,0.4);
}

/* ROTATING TEXT */
.circle{
  position:fixed;
  right:20px;
  top:50%;
  width:90px;
  height:90px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.circle span{
  position:absolute;
  font-size:10px;
  animation:spin 8s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="circle">
  <span>CRAFT • IMPACT • AUTOMATION •</span>
</div>

<section class="hero">
  <h1 id="title">Vijay Hayagrivan</h1>
  <p id="subtitle">Mechatronics Engineering Student</p>

  <a href="#" class="btn">LinkedIn</a>
  <a href="#" class="btn">GitHub</a>

  <img src="profile.jpg">
</section>

<script>

// GSAP ANIMATION (THIS IS THE KEY)
gsap.from("#title",{
  y:100,
  opacity:0,
  duration:1.2,
  ease:"power4.out"
});

gsap.from("#subtitle",{
  y:50,
  opacity:0,
  delay:0.3,
  duration:1
});

gsap.from(".btn",{
  y:30,
  opacity:0,
  stagger:0.2,
  delay:0.6
});

gsap.from("img",{
  scale:0.8,
  opacity:0,
  delay:0.8,
  duration:1
});

</script>

</body>
</html>
